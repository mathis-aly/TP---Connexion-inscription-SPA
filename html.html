<!doctype html>
<html lang="fr"></html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale = 1.0" />
  <title>Connexion</title>
</head>
<body>
  <h1>Connexion-Inscription-SPA</h1>


  <section id="homepage">
    <h2 >Page d'accueil</h2>
    <button>Se connecter</button>
    <button>Créer un compte</button>
  </section>


  <section id="login">
    <h2 >Connexion</h2>
    <form>
      <input type="email" id="mail" name="email" required placeholder="exemple@mail.com">
      <input type="password" id="MDP" required placeholder="Mot de passe">
      <input type="submit" id="submit" value="Se connecter">
    </form>
  </section>


  <section id="newAcc">
    <h2 >Créer un compte</h2>
    <form>
      <input type="email" id="newAccmail" name="email" required placeholder="exemple@mail.com">
      <input type="password" id="newAccMDP" required placeholder="Mot de passe">
      <input type="submit" id="newAccSub" value="Créer un compte">
    </form>
  
</body>
